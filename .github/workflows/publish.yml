name: Publish GHCR Images

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Convert repository owner to lowercase
        id: lowercase
        run: echo "owner=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push web
        uses: docker/build-push-action@v6
        with:
          context: ./axe-webhooks/web
          push: true
          tags: ghcr.io/${{ steps.lowercase.outputs.owner }}/axe-webhooks-web:latest

      - name: Build and push watcher
        uses: docker/build-push-action@v6
        with:
          context: ./axe-webhooks/watcher
          push: true
          tags: ghcr.io/${{ steps.lowercase.outputs.owner }}/axe-webhooks-watcher:latest
